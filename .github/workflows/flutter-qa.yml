name: Flutter QA

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env placeholder
        run: |
          touch .env
          echo "SUPABASE_URL=" >> .env
          echo "SUPABASE_ANON_KEY=" >> .env
          echo "API_BASE_URL=" >> .env
          echo "ONLINE_API_KEY=" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
