name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure platform folders
        run: flutter create . --platforms=android,ios

      - name: Ensure internet permission in manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "--- Manifest before patch ---"
          cat "$MANIFEST"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i 's|<manifest xmlns:android|<uses-permission android:name="android.permission.INTERNET"/>\n    <manifest xmlns:android|' "$MANIFEST"
            echo "--- Internet permission added ---"
          else
            echo "--- Internet permission already present ---"
          fi
          cat "$MANIFEST"

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "ONLINE_API_KEY=${{ secrets.ONLINE_API_KEY }}" >> .env

      - name: Pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
